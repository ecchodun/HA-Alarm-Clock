###############################################################################
# HA Alarm Clock Package
# GitHub: https://github.com/YOUR_USERNAME/ha-alarm-clock
#
# A fully-featured alarm clock for Home Assistant designed to run on a
# dedicated tablet (e.g. Lenovo, Fire HD) mounted in the bedroom.
#
# Features:
#   - Set alarm time via time picker
#   - Fade-in volume on alarm trigger
#   - Snooze and Dismiss controls
#   - Pick alarm sound from a folder of MP3s
#   - Customizable font color via HSL hue slider
#   - Auto brightness control (dim at night, bright in morning)
#   - Auto-stop after 3 minutes if not dismissed
#
# REQUIRED CUSTOMIZATION — search for "CUSTOMIZE" comments below
###############################################################################


###############################################################################
# INPUT HELPERS
###############################################################################

input_boolean:
  alarm_clock_enabled:
    name: Alarm Clock Enabled
    icon: mdi:alarm

  alarm_clock_ringing:
    name: Alarm Clock Ringing
    icon: mdi:alarm-bell

  alarm_clock_settings:
    name: Alarm Clock Settings Panel
    icon: mdi:cog


input_datetime:
  alarm_clock_time:
    name: Alarm Clock Time
    has_time: true
    has_date: false


input_number:
  alarm_clock_volume:
    name: Alarm Clock Volume
    min: 0
    max: 100
    step: 5
    unit_of_measurement: "%"
    icon: mdi:volume-high

  alarm_clock_snooze_minutes:
    name: Alarm Clock Snooze Minutes
    min: 1
    max: 30
    step: 1
    unit_of_measurement: "min"
    icon: mdi:alarm-snooze

  alarm_clock_font_hue:
    name: Alarm Clock Font Color Hue
    min: 0
    max: 360
    step: 1
    icon: mdi:palette

  # CUSTOMIZE: Only needed if controlling tablet brightness via HA.
  # Remove if you don't use Fully Kiosk Browser or similar.
  tablet_brightness:
    name: Tablet Brightness
    min: 0
    max: 255
    step: 1
    icon: mdi:brightness-6


input_select:
  alarm_clock_folder_songs:
    name: Alarm Clock Song
    options:
      - No songs loaded
    icon: mdi:music


###############################################################################
# TEMPLATE SENSORS
# Add these under your existing `template:` block in configuration.yaml,
# OR include them here if you use packages with template sensors supported.
#
# NOTE: If you use the legacy `sensor: platform: template` format, move these
# to your configuration.yaml sensor block instead.
###############################################################################

template:
  - sensor:
      - name: alarm_clock_display
        # Current time formatted for the clock display
        state: "{{ now().strftime('%-I:%M %p') }}"

      - name: alarm_clock_font_color
        # Converts the hue slider value into an HSL color string
        state: >
          {% set h = states('input_number.alarm_clock_font_hue') | int %}
          hsl({{ h }}, 100%, 50%)

      - name: alarm_clock_next_alarm
        # Human-readable next alarm time
        state: >
          {% set alarm_time = states('input_datetime.alarm_clock_time') %}
          {% if alarm_time not in ['unknown', 'unavailable', 'None', ''] %}
            {% set today = now().strftime("%Y-%m-%d") %}
            {{ as_timestamp(today ~ ' ' ~ alarm_time) | timestamp_custom("%I:%M %p") }}
          {% else %}
            None
          {% endif %}

      - name: day_of_the_week
        # Full day name (e.g. "Monday") for the clock display
        state: "{{ now().strftime('%A') }}"

      - name: today_date
        # Full date (e.g. "April 9, 2025") for the clock display
        state: "{{ now().strftime('%B %-d, %Y') }}"


###############################################################################
# SCRIPTS
###############################################################################

script:

  alarm_clock_start:
    alias: "Alarm Clock - Start"
    description: >
      Triggers the alarm: plays the selected sound with a gradual fade-in.
      Stops automatically after 3 minutes if not dismissed.
    sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.alarm_clock_ringing

      - delay: "00:00:02"

      - variables:
          s: "{{ states('input_select.alarm_clock_folder_songs') | string | trim }}"
          # CUSTOMIZE: Change 'wonderland.mp3' to your preferred fallback sound
          song_name: "{{ s if s != '' and s != 'unknown' else 'wonderland.mp3' }}"
          random_id: "{{ range(0,10000) | list | random }}"
          # CUSTOMIZE: Replace with your HA instance IP/hostname and port
          alarm_url: >-
            http://YOUR_HA_IP:8123/local/alarm_sounds/{{ song_name }}?v={{ random_id }}
          raw_volume: "{{ (states('input_number.alarm_clock_volume') | int / 100) | round(2) }}"
          max_volume: "{{ [raw_volume * 1.1, 1.0] | min }}"
          start_time: "{{ as_timestamp(now()) }}"
          step: 0.04
          delay_secs: 1.2
          start_volume: 0.01

      # Set initial low volume for fade-in
      - action: media_player.volume_set
        target:
          # CUSTOMIZE: Replace with your tablet's media_player entity
          entity_id: media_player.bedroom_tablet
        data:
          volume_level: "{{ start_volume }}"

      - delay: "00:00:01"

      # Play a silent MP3 first to "wake up" the media player
      - action: media_player.play_media
        target:
          entity_id: media_player.bedroom_tablet
        data:
          media:
            # CUSTOMIZE: Place a mute.mp3 (silent file) in your alarm_sounds folder
            media_content_id: http://YOUR_HA_IP:8123/local/alarm_sounds/mute.mp3?v=0
            media_content_type: music
            metadata: {}

      - delay: "00:00:02"

      - action: media_player.media_stop
        target:
          entity_id: media_player.bedroom_tablet

      # Now play the real alarm sound
      - action: media_player.play_media
        target:
          entity_id: media_player.bedroom_tablet
        data:
          media:
            media_content_id: "{{ alarm_url }}"
            media_content_type: music
            metadata: {}

      # Fade in volume loop — runs until dismissed or 3 minutes elapsed
      - repeat:
          until:
            - condition: template
              value_template: |
                {{ states('input_boolean.alarm_clock_ringing') == 'off'
                   or (as_timestamp(now()) - start_time) > 180 }}
          sequence:
            - condition: template
              value_template: >
                {{ (state_attr('media_player.bedroom_tablet','volume_level')
                | float(0)) < (max_volume | float) }}
            - target:
                entity_id: media_player.bedroom_tablet
              data:
                volume_level: >
                  {{ [
                  (state_attr('media_player.bedroom_tablet','volume_level') |
                  float(0)) + (step | float),
                       max_volume | float ] | min | round(2) }}
              action: media_player.volume_set
            - delay:
                seconds: "{{ delay_secs | float }}"

      # Auto-stop after fade-in loop completes
      - action: media_player.media_stop
        target:
          entity_id: media_player.bedroom_tablet

      - action: script.turn_on
        target:
          entity_id: script.alarm_clock_auto_stop


  alarm_clock_dismiss:
    alias: "Alarm Clock - Dismiss"
    description: Stops the alarm immediately.
    mode: single
    sequence:
      - target:
          entity_id: input_boolean.alarm_clock_ringing
        action: input_boolean.turn_off
      - target:
          # CUSTOMIZE: Replace with your tablet's media_player entity
          entity_id: media_player.bedroom_tablet
        action: media_player.media_stop


  alarm_clock_snooze:
    alias: "Alarm Clock - Snooze"
    description: Stops the alarm and restarts it after the configured snooze duration.
    mode: single
    sequence:
      - target:
          entity_id: media_player.bedroom_tablet
        action: media_player.media_stop
      - target:
          entity_id: input_boolean.alarm_clock_ringing
        action: input_boolean.turn_off
      - delay:
          seconds: >-
            {{ (states('input_number.alarm_clock_snooze_minutes') | float * 60) | int }}
      - target:
          entity_id: script.alarm_clock_start
        action: script.turn_on


  alarm_clock_auto_stop:
    alias: "Alarm Clock - Auto Stop"
    description: Called automatically after 3 minutes to silence the alarm.
    sequence:
      - target:
          entity_id: input_boolean.alarm_clock_ringing
        action: input_boolean.turn_off
      - target:
          entity_id: media_player.bedroom_tablet
        action: media_player.media_stop


###############################################################################
# AUTOMATIONS
###############################################################################

automation:

  - alias: "Alarm Clock - Auto Populate Song List"
    description: >
      Scans your alarm_sounds folder on startup and when files change,
      then populates the song picker dropdown automatically.
    triggers:
      - event: start
        trigger: homeassistant
      - entity_id: sensor.alarm_sounds
        trigger: state
    actions:
      - target:
          entity_id: input_select.alarm_clock_folder_songs
        data:
          options: |
            {{ state_attr('sensor.alarm_sounds', 'file_list')
               | map('regex_replace', '^.*/', '')
               | list }}
        action: input_select.set_options
    mode: single


  - alias: "Alarm Clock - Triggered"
    description: Fires the alarm when the current time matches the set alarm time.
    triggers:
      - value_template: |
          {% if is_state('input_boolean.alarm_clock_enabled','on') %}
            {% set at = states('input_datetime.alarm_clock_time')[:5] %}
            {{ states('sensor.time') == at }}
          {% else %}
            false
          {% endif %}
        trigger: template
    conditions: []
    actions:
      - action: script.turn_on
        target:
          entity_id: script.alarm_clock_start


  - alias: "Alarm Clock - Auto Brightness"
    description: >
      Dims the tablet at night and brightens it in the morning.
      Weekdays brighten at 9AM, weekends at 11AM.
      CUSTOMIZE: Adjust times and brightness values to your preference.
    triggers:
      - at: "23:00:00"
        id: night
        trigger: time
      - at: "09:00:00"
        id: morning_weekday
        trigger: time
      - at: "11:00:00"
        id: morning_weekend
        trigger: time
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: night
            sequence:
              - target:
                  # CUSTOMIZE: Replace with your tablet's brightness number entity
                  entity_id: number.bedroom_tablet_screen_brightness
                data:
                  # CUSTOMIZE: Set your preferred night brightness (0-255)
                  value: 6
                action: number.set_value

          - conditions:
              - condition: trigger
                id: morning_weekday
              - condition: time
                weekday:
                  - mon
                  - tue
                  - wed
                  - thu
                  - fri
            sequence:
              - target:
                  entity_id: number.bedroom_tablet_screen_brightness
                data:
                  # CUSTOMIZE: Set your preferred day brightness (0-255)
                  value: 200
                action: number.set_value

          - conditions:
              - condition: trigger
                id: morning_weekend
              - condition: time
                weekday:
                  - sat
                  - sun
            sequence:
              - target:
                  entity_id: number.bedroom_tablet_screen_brightness
                data:
                  value: 200
                action: number.set_value
    mode: single
