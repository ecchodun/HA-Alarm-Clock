###############################################################################
# configuration.yaml — required addition for HA Alarm Clock
#
# This is the ONLY thing that cannot live in the package file.
# Add it to your existing homeassistant: block and restart HA once.
# After that, all other changes only require a package/template reload.
#
# CUSTOMIZE: Update the path if your alarm sounds folder is elsewhere.
###############################################################################

homeassistant:
  allowlist_external_dirs:
    - "/config/www/alarm_sounds"

# If you haven't already enabled packages, also add:
#
#   homeassistant:
#     packages: !include_dir_named packages
